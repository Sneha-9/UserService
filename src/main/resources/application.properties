server.port=8099

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:userservice}
spring.datasource.username=${DB_USERNAME:sneha}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate specific settings
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
management.metrics.export.defaults.enabled=true
management.metrics.export.prometheus.enabled=true
management.endpoint.metrics.enabled=true
#management.endpoint.health.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.metrics.tags.application=user-service